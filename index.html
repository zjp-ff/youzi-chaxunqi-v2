<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游资查询器 — 游资席位查询</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1923;
    color: #e0e6ed;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
    border-bottom: 1px solid #2a3a4a;
    padding: 24px 20px 16px;
    text-align: center;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #f0c040, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 14px;
    color: #8899aa;
    margin-top: 4px;
  }
  .header .badge {
    display: inline-block;
    background: #1a3a4a;
    color: #6ab0d0;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 10px;
    margin-top: 6px;
  }
  .search-section {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 16px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    font-size: 16px;
    border: 2px solid #2a3a4a;
    border-radius: 12px;
    background: #1a2a3a;
    color: #e0e6ed;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus {
    border-color: #f0c040;
  }
  .search-box input::placeholder { color: #556677; }
  .search-box .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: #556677;
  }
  .search-hint {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    font-size: 13px;
    color: #667788;
  }
  .search-hint span {
    background: #1a2a3a;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid #2a3a4a;
    cursor: pointer;
    transition: all 0.15s;
  }
  .search-hint span:hover {
    background: #2a3a4a;
    border-color: #f0c040;
    color: #f0c040;
  }
  .stats-bar {
    max-width: 900px;
    margin: 12px auto 0;
    padding: 0 16px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #667788;
  }
  .stats-bar .count { color: #f0c040; font-weight: 600; }
  .data-summary {
    max-width: 900px;
    margin: 10px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .summary-item {
    background: #0f1a24;
    border: 1px solid #1a2a3a;
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
    flex: 1;
    max-width: 140px;
  }
  .summary-num {
    display: block;
    font-size: 20px;
    font-weight: 700;
    color: #f0c040;
  }
  .summary-lbl {
    display: block;
    font-size: 11px;
    color: #5a6a7a;
    margin-top: 2px;
  }
  .results {
    max-width: 900px;
    margin: 16px auto 40px;
    padding: 0 16px;
  }
  .card {
    background: #1a2a3a;
    border: 1px solid #2a3a4a;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: #3a5a6a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    color: #f0c040;
  }
  .card-title .short-name {
    color: #8899aa;
    font-weight: 400;
    font-size: 14px;
    margin-left: 8px;
  }
  .card-team {
    font-size: 14px;
    color: #ff6b35;
    font-weight: 500;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 8px 0;
  }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-s { background: #4a1a1a; color: #ff6b6b; }
  .tag-a { background: #3a2a1a; color: #f0a040; }
  .tag-b { background: #1a2a3a; color: #6ab0d0; }
  .tag-c { background: #1a2a2a; color: #66cc99; }
  .tag-d { background: #2a2a2a; color: #8899aa; }
  .tag-type-main { background: #3a1a3a; color: #d06ad0; }
  .tag-type-co { background: #1a3a2a; color: #66cc99; }
  .tag-type-sub { background: #2a2a3a; color: #8899aa; }
  .tag-type-other { background: #2a3a2a; color: #99cc66; }
  .tag-watch-high { background: #4a1a1a; color: #ff4444; }
  .tag-watch-mid { background: #3a2a1a; color: #ffaa44; }
  .tag-watch-low { background: #1a2a3a; color: #66aacc; }
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 20px;
    font-size: 13px;
    line-height: 1.7;
    margin-top: 8px;
  }
  .card-body .label { color: #667788; }
  .card-body .value { color: #c0d0e0; }
  .card-body .full-width { grid-column: 1 / -1; }
  .card-body .full-width .value { color: #a0b0c0; }
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #556677;
  }
  .no-results .big-icon { font-size: 48px; margin-bottom: 12px; }
  .no-results p { font-size: 15px; }
  .loading { text-align: center; padding: 40px; color: #556677; }

  .qr-section {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 16px;
    text-align: center;
  }
  .qr-title {
    font-size: 14px;
    color: #8899aa;
    margin-bottom: 12px;
  }
  .qr-img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    border: 2px solid #2a3a4a;
  }
  .qr-img:hover {
    border-color: #f0c040;
  }
  @media (max-width: 600px) {
    .qr-img { width: 150px; height: 150px; }
    .qr-title { font-size: 12px; }
  }

  .footer-note {
    max-width: 900px;
    margin: 0 auto 30px;
    padding: 0 16px;
    text-align: center;
    font-size: 11px;
    color: #3a4a5a;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .card-body { grid-template-columns: 1fr; }
    .header { padding: 14px 12px 12px; }
    .header h1 { font-size: 20px; }
    .header .subtitle { font-size: 12px; }
    .header .badge { font-size: 11px; padding: 2px 8px; }
    .search-section { margin: 14px auto; padding: 0 12px; }
    .search-box input { padding: 12px 12px 12px 40px; font-size: 15px; }
    .search-hint { gap: 4px; }
    .search-hint span { font-size: 11px; padding: 2px 8px; }
    .stats-bar { padding: 0 12px; font-size: 11px; }
    .data-summary { padding: 0 12px; gap: 5px; }
    .summary-item { padding: 6px 8px; max-width: none; }
    .summary-num { font-size: 16px; }
    .summary-lbl { font-size: 10px; }
    .results { padding: 0 12px; }
    .card { padding: 14px 14px; }
    .card-title { font-size: 15px; }
    .card-title .short-name { font-size: 12px; margin-left: 4px; display: block; }
    .card-team { font-size: 12px; }
    .card-body { font-size: 12px; gap: 4px 12px; }
    .card-tags { gap: 3px; }
    .tag { font-size: 10px; padding: 1px 6px; }
    .qr-section {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 16px;
    text-align: center;
  }
  .qr-title {
    font-size: 14px;
    color: #8899aa;
    margin-bottom: 12px;
  }
  .qr-img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    border: 2px solid #2a3a4a;
  }
  .qr-img:hover {
    border-color: #f0c040;
  }
  @media (max-width: 600px) {
    .qr-img { width: 150px; height: 150px; }
    .qr-title { font-size: 12px; }
  }

  .footer-note { font-size: 10px; padding: 0 12px; }
    .header div[style*="display:inline-block"] { display: block !important; font-size: 12px !important; padding: 8px 12px !important; }
  }

  @media (max-width: 400px) {
    .header h1 { font-size: 17px; }
    .card-header { flex-direction: column; gap: 4px; }
    .card-body { grid-template-columns: 1fr; }
    .data-summary { flex-wrap: wrap; }
    .summary-item { flex: 1 1 40%; }
  }
</style>
</head>

<div class="header">

<script>
// data loaded from inline script below
function getTagClass(level) {
  if (!level) return 'tag-d';
  const l = level.trim();
  if (l.startsWith('S')) return 'tag-s';
  if (l.startsWith('A')) return 'tag-a';
  if (l.startsWith('B')) return 'tag-b';
  if (l.startsWith('C')) return 'tag-c';
  return 'tag-d';
}

function getTypeTag(type) {
  if (!type) return 'tag-type-other';
  const t = type.trim();
  if (t.includes('主力核心')) return 'tag-type-main';
  if (t.includes('协同关联')) return 'tag-type-co';
  if (t.includes('分仓') || t.includes('普通关联')) return 'tag-type-sub';
  return 'tag-type-other';
}

function getWatchTag(level) {
  if (!level) return 'tag-watch-low';
  const l = level.trim();
  if (l.includes('高')) return 'tag-watch-high';
  if (l.includes('中')) return 'tag-watch-mid';
  return 'tag-watch-low';
}

function render(items) {
  const container = document.getElementById('results');

  document.getElementById('matchCount').textContent = items.length;

  if (items.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="big-icon">🔍</div><p>没有找到匹配的席位，试试其他关键词</p></div>`;
    if (hotSection) hotSection.style.display = 'none';
    return;
  }



  let html = '';
  for (const item of items) {
    const team = item['对应游资团队'] || '';
    const person = item['游资核心人物'] || '';
    const fullName = item['营业部全称'] || '';
    const shortName = item['营业部简称'] || '';
    const broker = item['所属券商'] || '';
    const city = item['所在城市'] || '';
    const province = item['所在省份'] || '';
    const scale = item['游资资金规模区间'] || '';
    const style = item['游资核心操作风格'] || '';
    const theme = item['游资擅长赛道/题材'] || '';
    const seatType = item['席位类型'] || '';
    const activity = item['席位活跃度等级'] || '';
    const feature = item['标志性操作特征'] || '';
    const related = item['关联协同席位'] || '';
    const watch = item['监管关注等级'] || '';
    const remark = item['原始备注信息'] || '';
    const supplement = item['补充说明'] || '';

    html += `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${fullName}<span class="short-name">${shortName}</span></div>
          <div style="margin-top:4px;font-size:13px;color:#667788;">${broker}</div>
        </div>
        <div class="card-team">${team}${person ? ' · ' + person : ''}</div>
      </div>
      <div class="card-tags">
        <span class="tag ${getTagClass(activity)}">${activity || '未评级'}</span>
        <span class="tag ${getTypeTag(seatType)}">${seatType || '未分类'}</span>
        <span class="tag ${getWatchTag(watch)}">🛡️ ${watch || '未关注'}</span>
        ${scale ? `<span class="tag tag-d">💰 ${scale}</span>` : ''}
      </div>
      <div class="card-body">
        <div><span class="label">📍 城市</span><br><span class="value">${city}${province ? ' · ' + province : ''}</span></div>
        <div><span class="label">💰 资金规模</span><br><span class="value">${scale || '-'}</span></div>
        <div class="full-width"><span class="label">🎯 操作风格</span><br><span class="value">${style || '-'}</span></div>
        <div class="full-width"><span class="label">📈 擅长赛道</span><br><span class="value">${theme || '-'}</span></div>
        <div class="full-width"><span class="label">🏷️ 标志性特征</span><br><span class="value">${feature || '-'}</span></div>
        ${related ? `<div class="full-width"><span class="label">🔗 关联协同</span><br><span class="value">${related}</span></div>` : ''}
        ${remark ? `<div class="full-width"><span class="label">📝 备注</span><br><span class="value">${remark}</span></div>` : ''}
        ${supplement ? `<div class="full-width"><span class="label">📌 补充</span><br><span class="value">${supplement}</span></div>` : ''}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function filterData(query) {
  if (!query.trim()) return data;
  const q = query.trim().toLowerCase();
  return data.filter(item => {
    const fields = [
      item['营业部全称'], item['营业部简称'], item['所属券商'],
      item['所在城市'], item['所在省份'], item['对应游资团队'],
      item['游资核心人物'], item['游资核心操作风格'], item['游资擅长赛道/题材'],
      item['席位类型'], item['席位活跃度等级'], item['标志性操作特征'],
      item['关联协同席位'], item['监管关注等级'], item['原始备注信息'], item['补充说明']
    ];
    return fields.some(f => f && f.toLowerCase().includes(q));
  });
}

document.getElementById('searchInput').addEventListener('input', function() {
  const filtered = filterData(this.value);
  render(filtered);
});

document.querySelectorAll('.search-hint span').forEach(el => {
  el.addEventListener('click', function() {
    document.getElementById('searchInput').value = this.textContent;
    const filtered = filterData(this.textContent);
    render(filtered);
  });
});
